<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ติดตามผลการประเมิน อปท.</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2e4a;--navy-mid:#24426b;--blue:#2e6fad;--blue-lt:#ddeeff;
  --teal:#1d8a74;--teal-lt:#d8f2ec;--amber:#b86a00;--amber-lt:#fef0d6;
  --purple:#5b3fa6;--purple-lt:#ede9ff;
  --red:#b83232;--red-lt:#fde8e8;--border:#dde3ec;
  --text:#1a2332;--text-2:#556070;--text-3:#8a96a3;--white:#fff;--radius:8px;
}
body{font-family:'Sarabun',sans-serif;background:#eef1f6;color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
.header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);color:white;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header h1{font-size:18px;font-weight:600}
.header p{font-size:12px;opacity:.65;margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.chip{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 14px;font-size:12px}
.view-tag{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:3px 12px;font-size:11px;color:rgba(255,255,255,.85)}
.btn{font-family:inherit;font-size:12px;border-radius:var(--radius);cursor:pointer;display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border:none;transition:all .2s}
.btn-ghost{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:white}
.btn-ghost:hover{background:rgba(255,255,255,.25)}
.main{padding:20px 24px;max-width:1500px;margin:0 auto}
.state-box{text-align:center;padding:60px 20px;color:var(--text-2)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
/* metrics */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.metric{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:var(--radius) 0 0 var(--radius)}
.m-total::before{background:var(--navy)}.m-done::before{background:var(--teal)}.m-active::before{background:var(--blue)}.m-late::before{background:var(--red)}.m-none::before{background:var(--amber)}.m-jobs::before{background:var(--purple)}
.m-label{font-size:11px;color:var(--text-3);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.m-value{font-size:28px;font-weight:600;margin-top:4px;line-height:1}
.m-total .m-value{color:var(--navy)}.m-done .m-value{color:var(--teal)}.m-active .m-value{color:var(--blue)}.m-late .m-value{color:var(--red)}.m-none .m-value{color:var(--amber)}.m-jobs .m-value{color:var(--purple)}
.m-sub{font-size:11px;color:var(--text-3);margin-top:4px}
/* charts */
.charts-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:960px){.charts-row{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.charts-row{grid-template-columns:1fr}}
.chart-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:16px}
.chart-title{font-size:12px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.donut-wrap{position:relative;width:120px;height:120px;margin:0 auto 10px}
.donut-wrap svg{transform:rotate(-90deg)}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:22px;font-weight:600;color:var(--navy)}
.donut-center span{font-size:10px;font-weight:400;color:var(--text-3)}
.bar-chart{display:flex;flex-direction:column;gap:7px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{width:20px;color:var(--text-3);text-align:right;flex-shrink:0;font-size:10px}
.bar-outer{flex:1;height:14px;background:#eef1f6;border-radius:4px;overflow:hidden}
.bar-inner{height:100%;border-radius:4px;transition:width .5s}
.bar-count{font-size:11px;color:var(--text-3);flex-shrink:0;min-width:18px;text-align:right}
.legend{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:4px}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-2)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.overdue-list{display:flex;flex-direction:column;gap:5px;max-height:185px;overflow-y:auto}
.overdue-item{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:6px;border:1px solid}
.no-overdue{text-align:center;padding:22px;color:var(--teal);font-size:12px}
/* table section */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-header h2{font-size:13px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.toolbar select,.toolbar input{font-family:inherit;font-size:13px;border:1px solid var(--border);border-radius:var(--radius);background:var(--white);color:var(--text);padding:6px 10px;height:34px;outline:none;transition:border-color .15s}
.toolbar select:focus,.toolbar input:focus{border-color:var(--blue)}
.toolbar input{width:220px}
.result-count{font-size:12px;color:var(--text-3);margin-left:auto}
.table-wrap{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#f0f3f8;color:var(--text-2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
thead th:hover{background:#e4e9f2}
.sort-icon{display:inline-block;margin-left:4px;opacity:.35;font-size:10px}
.sort-asc .sort-icon,.sort-desc .sort-icon{opacity:1;color:var(--blue)}
tbody tr{border-bottom:1px solid #f0f3f8;transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f0f6ff}
td{padding:8px 12px;vertical-align:middle}
.td-name{font-size:12px;font-weight:500;min-width:150px}
.td-sm{font-size:11px;color:var(--text-3)}
.td-date{font-size:12px;color:var(--text-2);white-space:nowrap}
.td-days{font-size:12px;white-space:nowrap;text-align:center;font-weight:500}
.days-ok{color:var(--teal)}.days-warn{color:var(--amber)}.days-late{color:var(--red)}.days-done{color:var(--text-3)}
/* jobs */
.jobs-cell{display:flex;flex-direction:column;gap:3px;min-width:130px;max-width:200px}
.jobs-n{font-size:11px;font-weight:600;color:var(--purple)}
.jobs-tags{display:flex;flex-wrap:wrap;gap:3px}
.job-tag{font-size:10px;background:var(--purple-lt);color:var(--purple);padding:1px 7px;border-radius:12px;white-space:nowrap}
.jobs-more{background:none;border:none;cursor:pointer;color:var(--purple);font-size:11px;text-decoration:underline;padding:0;font-family:inherit}
.jobs-none{font-size:11px;color:var(--text-3)}
/* badge */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap}
.b-s0{background:#eff1f5;color:var(--text-3)}.b-s1{background:var(--amber-lt);color:var(--amber)}.b-s2{background:var(--purple-lt);color:var(--purple)}.b-s3{background:var(--blue-lt);color:#1a5a9a}.b-s4{background:#e0f0ff;color:#1a6a9a}.b-s5{background:#d8eeff;color:#175d8a}.b-s6{background:#cce8ff;color:#154d7a}.b-s7{background:#e8d6ff;color:#3d2880}.b-s8{background:var(--teal-lt);color:var(--teal)}
/* progress */
.prog-wrap{min-width:90px}
.prog-pct{font-size:10px;color:var(--text-3);margin-bottom:3px}
.prog-bar{height:6px;background:#e4e9f0;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}
.pf-done{background:var(--teal)}.pf-active{background:var(--blue)}.pf-warn{background:var(--amber)}.pf-late{background:var(--red)}.pf-none{background:#ccc}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none}
.overlay.open{display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal{background:var(--white);border-radius:12px;width:100%;max-width:460px;overflow:hidden;animation:su .25s ease}
@keyframes su{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hdr{background:linear-gradient(135deg,var(--navy),var(--navy-mid));color:white;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.modal-hdr h2{font-size:15px;font-weight:600}
.modal-x{background:none;border:none;color:white;font-size:20px;cursor:pointer;opacity:.7;padding:0 4px}
.modal-x:hover{opacity:1}
.modal-body{padding:20px}
/* footer */
.footer{background:linear-gradient(135deg,var(--navy),var(--navy-mid));color:rgba(255,255,255,.55);font-size:12px;padding:18px 28px;margin-top:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.footer-dev{color:rgba(255,255,255,.8);font-weight:500}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>📊 ติดตามผลการประเมิน อปท.</h1>
    <p>ระบบติดตามผลการประเมินองค์กรปกครองส่วนท้องถิ่น · อัปเดตจาก Google Sheets</p>
  </div>
  <div class="hdr-right">
    <span class="view-tag">👁 โหมดดูข้อมูล</span>
    <div class="chip" id="today-chip"></div>
    <button class="btn btn-ghost" onclick="loadData()">↺ รีเฟรช</button>
  </div>
</div>

<div class="main" id="main">
  <div class="state-box"><div class="spinner"></div><div>กำลังโหลดข้อมูล…</div></div>
</div>

<div class="footer">
  <span>© 2569 ระบบติดตามผลการประเมิน อปท.</span>
  <span class="footer-dev">⚙ พัฒนาโดย Tanawat Yodburee</span>
</div>

<!-- jobs detail modal -->
<div class="overlay" id="jov" onclick="this.classList.remove('open')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hdr"><h2 id="jov-title">รายการงาน</h2><button class="modal-x" onclick="document.getElementById('jov').classList.remove('open')">✕</button></div>
    <div class="modal-body" id="jov-body"></div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbyWTltw9hOID8t-WlRz_YvgRxBipx2sbYRfJmFObTChjKmik8RPNZyHDgBWFc5W5P4/exec';

const SL = [
  {s:'ยังไม่ยื่น',       c:'b-s0', p:0  },
  {s:'เสนอราคา',         c:'b-s1', p:12 },
  {s:'ใบสั่งจ้าง',       c:'b-s2', p:25 },
  {s:'ขออนุมัติ',        c:'b-s3', p:37 },
  {s:'จัดทำรายงาน',      c:'b-s4', p:50 },
  {s:'ตรวจสอบ',          c:'b-s5', p:62 },
  {s:'จัดทำเล่ม',        c:'b-s6', p:75 },
  {s:'จัดส่งรายงาน',     c:'b-s7', p:87 },
  {s:'เสร็จสิ้น ✓',      c:'b-s8', p:100},
];
const SC = ['#8a96a3','#b86a00','#5b3fa6','#2e6fad','#1d7aad','#1d6aad','#1a5a9a','#24426b','#1d8a74'];
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const fd = d => (!d||isNaN(d)) ? '—' : d.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'});
const pd = s => { if(!s||!String(s).trim()) return null; const d=new Date(String(s).trim()); return isNaN(d)?null:d; };
const dd = (a,b) => Math.round((b-a)/86400000);

let rows=[], sc=null, sd=1;

async function loadData() {
  document.getElementById('main').innerHTML = '<div class="state-box"><div class="spinner"></div><div>กำลังโหลดข้อมูล…</div></div>';
  try {
    const res = await fetch(API + '?action=getAll');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const raw = await res.json();
    if (raw.error) throw new Error(raw.error);
    rows = raw.map(r => ({
      ...r,
      sn: parseInt(r.status)||0,
      sd: pd(r.startDate),
      dd: pd(r.deadline),
      ja: r.jobs ? r.jobs.split(',').map(j=>j.trim()).filter(Boolean) : []
    }));
    render();
  } catch(e) {
    document.getElementById('main').innerHTML = `<div class="state-box">
      <div style="font-size:32px;margin-bottom:10px">⚠️</div>
      <div style="font-weight:600">โหลดข้อมูลไม่สำเร็จ</div>
      <div style="font-size:12px;color:#8a96a3;margin-top:6px">${e.message}</div>
      <button class="btn btn-ghost" onclick="loadData()" style="background:var(--blue);color:white;margin:16px auto 0">ลองใหม่</button>
    </div>`;
  }
}

function render() {
  const m = document.getElementById('main');
  m.innerHTML = '';
  m.appendChild(mkMetrics());
  m.appendChild(mkCharts());
  const sec = document.createElement('div');
  sec.innerHTML = `
    <div class="sec-header"><h2>รายการ อปท. ทั้งหมด</h2></div>
    <div class="toolbar">
      <select id="fsf" onchange="filter()">
        <option value="all">ทุกสถานะ</option>
        ${SL.map((s,i)=>`<option value="${i}">${i}. ${s.s}</option>`).join('')}
        <option value="late">เกินกำหนด</option>
      </select>
      <select id="ftf" onchange="filter()">
        <option value="all">ทุกประเภท</option>
        <option>อบต.</option><option>ทต.</option><option>ทน.</option><option>อบจ.</option>
      </select>
      <input type="text" id="fq" placeholder="ค้นหาชื่อ อปท. / งาน…" oninput="filter()">
      <span class="result-count" id="rc"></span>
    </div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th onclick="sort('name')" id="th-name">ชื่อ อปท.<span class="sort-icon">⇅</span></th>
        <th>ประเภท / จังหวัด</th>
        <th onclick="sort('jn')" id="th-jn">งานประเมิน<span class="sort-icon">⇅</span></th>
        <th onclick="sort('sn')" id="th-sn">สถานะ<span class="sort-icon">⇅</span></th>
        <th>ความคืบหน้า</th>
        <th onclick="sort('sd')" id="th-sd">วันเริ่ม<span class="sort-icon">⇅</span></th>
        <th onclick="sort('dd')" id="th-dd">กำหนดเสร็จ<span class="sort-icon">⇅</span></th>
        <th onclick="sort('dl')" id="th-dl">วันคงเหลือ<span class="sort-icon">⇅</span></th>
        <th>หมายเหตุ</th>
      </tr></thead>
      <tbody id="tb"></tbody>
    </table></div>`;
  m.appendChild(sec);
  filter();
}

function mkMetrics() {
  const total=rows.length, done=rows.filter(r=>r.sn===8).length,
    active=rows.filter(r=>r.sn>0&&r.sn<8).length,
    none=rows.filter(r=>r.sn===0).length,
    late=rows.filter(r=>r.sn<8&&r.dd&&r.dd<TODAY).length,
    tj=rows.reduce((s,r)=>s+r.ja.length,0),
    pct=total?Math.round(done/total*100):0;
  const d=document.createElement('div'); d.className='metrics';
  d.innerHTML=`
    <div class="metric m-total"><div class="m-label">อปท. ทั้งหมด</div><div class="m-value">${total}</div><div class="m-sub">รายการในระบบ</div></div>
    <div class="metric m-done"><div class="m-label">เสร็จสิ้น</div><div class="m-value">${done}</div><div class="m-sub">${pct}% ของทั้งหมด</div></div>
    <div class="metric m-active"><div class="m-label">กำลังดำเนินการ</div><div class="m-value">${active}</div><div class="m-sub">ขั้นตอน 1–7</div></div>
    <div class="metric m-none"><div class="m-label">ยังไม่ยื่น</div><div class="m-value">${none}</div><div class="m-sub">รอดำเนินการ</div></div>
    <div class="metric m-late"><div class="m-label">เกินกำหนด</div><div class="m-value">${late}</div><div class="m-sub">ต้องเร่งดำเนิน</div></div>
    <div class="metric m-jobs"><div class="m-label">งานรวมทั้งหมด</div><div class="m-value">${tj}</div><div class="m-sub">จาก ${total} อปท.</div></div>`;
  return d;
}

function mkCharts() {
  const total=rows.length||1, done=rows.filter(r=>r.sn===8).length,
    active=rows.filter(r=>r.sn>0&&r.sn<8).length, none=rows.filter(r=>r.sn===0).length,
    pct=Math.round(done/total*100), C=2*Math.PI*50, seg=p=>p/100*C;
  const d=document.createElement('div'); d.className='charts-row';
  d.innerHTML=`
  <div class="chart-card">
    <div class="chart-title">ภาพรวมการดำเนินงาน</div>
    <div class="donut-wrap">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="50" fill="none" stroke="#eef1f6" stroke-width="16"/>
        <circle cx="60" cy="60" r="50" fill="none" stroke="#1d8a74" stroke-width="16" stroke-dasharray="${C}" stroke-dashoffset="${C-seg(done/total*100)}" stroke-linecap="round"/>
        <circle cx="60" cy="60" r="50" fill="none" stroke="#2e6fad" stroke-width="16" opacity=".35" stroke-dasharray="${C}" stroke-dashoffset="${C-seg((done+active)/total*100)}" stroke-linecap="round"/>
      </svg>
      <div class="donut-center">${pct}%<span>เสร็จสิ้น</span></div>
    </div>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#1d8a74"></div>เสร็จสิ้น (${done})</div>
      <div class="leg-item"><div class="leg-dot" style="background:#2e6fad"></div>กำลังดำเนิน (${active})</div>
      <div class="leg-item"><div class="leg-dot" style="background:#dde3ec"></div>ยังไม่ยื่น (${none})</div>
    </div>
  </div>
  <div class="chart-card"><div class="chart-title">จำนวน อปท. แต่ละขั้นตอน</div><div class="bar-chart" id="bars"></div></div>
  <div class="chart-card"><div class="chart-title">อปท. ที่ใกล้/เกินกำหนด</div><div id="ov"></div></div>`;
  setTimeout(()=>{
    const counts=SL.map((_,i)=>rows.filter(r=>r.sn===i).length), mx=Math.max(...counts,1);
    document.getElementById('bars').innerHTML=counts.map((c,i)=>`<div class="bar-row"><div class="bar-label">${i}</div><div class="bar-outer"><div class="bar-inner" style="width:${c/mx*100}%;background:${SC[i]}"></div></div><div class="bar-count">${c}</div></div>`).join('');
    const cut=new Date(TODAY.getTime()+14*86400000);
    const warn=rows.filter(r=>r.sn<8&&r.dd&&r.dd<=cut).sort((a,b)=>(a.dd||0)-(b.dd||0)).slice(0,6);
    const ov=document.getElementById('ov');
    if(!warn.length){ov.innerHTML='<div class="no-overdue">✅ ไม่มี อปท. ที่ใกล้หรือเกินกำหนด</div>';}
    else{ov.innerHTML=`<div class="overdue-list">${warn.map(r=>{const l=dd(TODAY,r.dd),late=l<0,col=late?'var(--red)':'var(--amber)',bg=late?'var(--red-lt)':'var(--amber-lt)',bc=late?'#f5b3b3':'#f5d28a',txt=late?`เกิน ${Math.abs(l)} วัน`:`${l} วัน`;return`<div class="overdue-item" style="background:${bg};border-color:${bc}"><div style="font-size:12px;font-weight:500;color:${col}">${r.name}</div><div style="font-size:11px;color:${col}">${txt}</div></div>`;}).join('')}</div>`;}
  },0);
  return d;
}

function filter() {
  const sf=document.getElementById('fsf')?.value||'all', tf=document.getElementById('ftf')?.value||'all', q=(document.getElementById('fq')?.value||'').toLowerCase();
  let data=rows.map(r=>({...r,jn:r.ja.length,dl:r.dd?dd(TODAY,r.dd):null})).filter(r=>{
    if(sf==='late'){if(r.sn===8||!r.dd||r.dd>=TODAY)return false;}
    else if(sf!=='all'&&parseInt(sf)!==r.sn)return false;
    if(tf!=='all'&&r.type!==tf)return false;
    if(q&&!r.name.toLowerCase().includes(q)&&!(r.province||'').toLowerCase().includes(q)&&!r.ja.some(j=>j.toLowerCase().includes(q)))return false;
    return true;
  });
  if(sc){data=[...data].sort((a,b)=>{let va=a[sc],vb=b[sc];if(va instanceof Date)va=va.getTime();if(vb instanceof Date)vb=vb.getTime();if(va==null)va=sd>0?Infinity:-Infinity;if(vb==null)vb=sd>0?Infinity:-Infinity;if(typeof va==='string')return va.localeCompare(vb,'th')*sd;return(va-vb)*sd;});}
  const rc=document.getElementById('rc'); if(rc)rc.textContent=`แสดง ${data.length} รายการ`;
  const tb=document.getElementById('tb'); if(!tb)return;
  tb.innerHTML=data.map(r=>{
    const st=SL[r.sn]||SL[0],l=r.dl,late=r.sn<8&&r.dd&&r.dd<TODAY;
    let dc='days-ok',dt='—';
    if(r.sn===8){dc='days-done';dt='เสร็จแล้ว';}
    else if(l!==null){dt=l<0?`เกิน ${Math.abs(l)} วัน`:`${l} วัน`;dc=l<0?'days-late':l<=14?'days-warn':'days-ok';}
    let pf='pf-active';if(r.sn===8)pf='pf-done';else if(late)pf='pf-late';else if(l!==null&&l<=14)pf='pf-warn';else if(r.sn===0)pf='pf-none';
    let jh='';
    if(!r.ja.length)jh='<div class="jobs-none">— ไม่ระบุ</div>';
    else if(r.ja.length<=2)jh=`<div class="jobs-n">${r.ja.length} งาน</div><div class="jobs-tags">${r.ja.map(j=>`<span class="job-tag">${j}</span>`).join('')}</div>`;
    else jh=`<div class="jobs-n">${r.ja.length} งาน</div><div class="jobs-tags">${r.ja.slice(0,2).map(j=>`<span class="job-tag">${j}</span>`).join('')}<button class="jobs-more" onclick="showJobs('${r.id}')">+${r.ja.length-2}</button></div>`;
    return`<tr><td class="td-name">${r.name}</td><td><div class="td-sm">${r.type||'—'}</div><div class="td-sm">${r.province||'—'}</div></td><td><div class="jobs-cell">${jh}</div></td><td><span class="badge ${st.c}">${r.sn}. ${st.s}</span></td><td><div class="prog-wrap"><div class="prog-pct">${st.p}%</div><div class="prog-bar"><div class="prog-fill ${pf}" style="width:${st.p}%"></div></div></div></td><td class="td-date">${fd(r.sd)}</td><td class="td-date">${fd(r.dd)}</td><td class="td-days ${dc}">${dt}</td><td style="font-size:11px;color:var(--text-3);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.note||'—'}</td></tr>`;
  }).join('');
}

function sort(col){
  if(sc===col)sd*=-1;else{sc=col;sd=1;}
  ['name','jn','sn','sd','dd','dl'].forEach(c=>{const th=document.getElementById('th-'+c);if(!th)return;th.classList.remove('sort-asc','sort-desc');th.querySelector('.sort-icon').textContent='⇅';});
  const th=document.getElementById('th-'+col);if(th){th.classList.add(sd===1?'sort-asc':'sort-desc');th.querySelector('.sort-icon').textContent=sd===1?'↑':'↓';}
  filter();
}

function showJobs(id){
  const r=rows.find(x=>x.id===id);if(!r)return;
  document.getElementById('jov-title').textContent=`งานประเมิน — ${r.name}`;
  document.getElementById('jov-body').innerHTML=`<p style="font-size:12px;color:var(--text-2);margin-bottom:12px">จำนวน <strong>${r.ja.length} งาน</strong></p><div style="display:flex;flex-direction:column;gap:8px">${r.ja.map((j,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--purple-lt);border-radius:var(--radius);border:1px solid #d5c8f5"><span style="width:22px;height:22px;background:var(--purple);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0">${i+1}</span><span>${j}</span></div>`).join('')}</div>`;
  document.getElementById('jov').classList.add('open');
}

document.getElementById('today-chip').textContent='วันนี้: '+TODAY.toLocaleDateString('th-TH',{weekday:'short',day:'numeric',month:'long',year:'numeric'});
loadData();
</script>
</body>
</html>
