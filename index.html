<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ติดตามผลการประเมิน อปท.</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2e4a;--navy-mid:#24426b;--blue:#2e6fad;--blue-lt:#ddeeff;
  --teal:#1d8a74;--teal-lt:#d8f2ec;--amber:#b86a00;--amber-lt:#fef0d6;
  --purple:#5b3fa6;--purple-lt:#ede9ff;
  --red:#b83232;--red-lt:#fde8e8;--border:#dde3ec;
  --text:#1a2332;--text-2:#556070;--text-3:#8a96a3;--white:#fff;--radius:8px;
}
body{font-family:'Sarabun',sans-serif;background:#eef1f6;color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}
.header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);color:white;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header h1{font-size:18px;font-weight:600}
.header p{font-size:12px;opacity:.65;margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.chip{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:4px 14px;font-size:12px;color:rgba(255,255,255,.9)}
.btn{font-family:inherit;font-size:12px;border-radius:var(--radius);cursor:pointer;display:inline-flex;align-items:center;gap:6px;padding:6px 14px;transition:all .2s;border:none}
.btn-ghost{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:white}
.btn-ghost:hover{background:rgba(255,255,255,.25)}
.btn-primary{background:var(--blue);border:1px solid var(--blue);color:white}
.btn-primary:hover{background:#245d99}
.btn-sm{padding:4px 10px;font-size:11px}
.main{padding:20px 24px;max-width:1500px;margin:0 auto}
.state-box{text-align:center;padding:60px 20px;color:var(--text-2);font-size:14px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.metric{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:var(--radius) 0 0 var(--radius)}
.m-total::before{background:var(--navy)}.m-done::before{background:var(--teal)}.m-active::before{background:var(--blue)}.m-late::before{background:var(--red)}.m-none::before{background:var(--amber)}.m-jobs::before{background:var(--purple)}
.m-label{font-size:11px;color:var(--text-3);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.m-value{font-size:28px;font-weight:600;margin-top:4px;line-height:1}
.m-total .m-value{color:var(--navy)}.m-done .m-value{color:var(--teal)}.m-active .m-value{color:var(--blue)}.m-late .m-value{color:var(--red)}.m-none .m-value{color:var(--amber)}.m-jobs .m-value{color:var(--purple)}
.m-sub{font-size:11px;color:var(--text-3);margin-top:4px}
.charts-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:960px){.charts-row{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.charts-row{grid-template-columns:1fr}}
.chart-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:16px}
.chart-title{font-size:12px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.donut-wrap{position:relative;width:120px;height:120px;margin:0 auto 10px}
.donut-wrap svg{transform:rotate(-90deg)}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:22px;font-weight:600;color:var(--navy)}
.donut-center span{font-size:10px;font-weight:400;color:var(--text-3)}
.bar-chart{display:flex;flex-direction:column;gap:7px}
.bar-row{display:flex;align-items:center;gap:8px;font-size:11px}
.bar-label{width:20px;color:var(--text-3);text-align:right;flex-shrink:0;font-size:10px}
.bar-outer{flex:1;height:14px;background:#eef1f6;border-radius:4px;overflow:hidden}
.bar-inner{height:100%;border-radius:4px;transition:width .5s ease}
.bar-count{font-size:11px;color:var(--text-3);flex-shrink:0;min-width:18px;text-align:right}
.legend{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-2)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.overdue-list{display:flex;flex-direction:column;gap:5px;max-height:185px;overflow-y:auto}
.overdue-item{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:6px;border:1px solid}
.no-overdue{text-align:center;padding:22px;color:var(--teal);font-size:12px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-header h2{font-size:13px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.toolbar select,.toolbar input{font-family:inherit;font-size:13px;border:1px solid var(--border);border-radius:var(--radius);background:var(--white);color:var(--text);padding:6px 10px;height:34px;outline:none;transition:border-color .15s}
.toolbar select:focus,.toolbar input:focus{border-color:var(--blue)}
.toolbar input[type=text]{width:220px}
.result-count{font-size:12px;color:var(--text-3);margin-left:auto}
.table-wrap{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);overflow-x:auto;margin-bottom:8px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#f0f3f8;color:var(--text-2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--border);user-select:none}
thead th.sortable{cursor:pointer}
thead th.sortable:hover{background:#e4e9f2;color:var(--navy)}
thead th .sort-icon{display:inline-block;margin-left:4px;opacity:.35;font-size:10px}
thead th.sort-asc .sort-icon,thead th.sort-desc .sort-icon{opacity:1;color:var(--blue)}
tbody tr{border-bottom:1px solid #f0f3f8;transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f0f6ff}
td{padding:8px 12px;vertical-align:middle}
.td-name{font-size:12px;font-weight:500;color:var(--text);min-width:150px}
.td-meta{font-size:11px;color:var(--text-3)}
.td-date{font-size:12px;color:var(--text-2);white-space:nowrap}
.td-days{font-size:12px;white-space:nowrap;text-align:center;font-weight:500}
.days-ok{color:var(--teal)}.days-warn{color:var(--amber)}.days-late{color:var(--red)}.days-done{color:var(--text-3)}
.jobs-cell{display:flex;flex-direction:column;gap:3px;min-width:140px;max-width:220px}
.jobs-count{font-size:11px;font-weight:600;color:var(--purple)}
.jobs-tags{display:flex;flex-wrap:wrap;gap:3px}
.job-tag{font-size:10px;background:var(--purple-lt);color:var(--purple);padding:1px 7px;border-radius:12px;white-space:nowrap}
.jobs-empty{font-size:11px;color:var(--text-3)}
.jobs-detail-btn{background:none;border:none;cursor:pointer;color:var(--purple);font-size:11px;text-decoration:underline;padding:0;font-family:inherit}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap}
.b-s0{background:#eff1f5;color:var(--text-3)}.b-s1{background:var(--amber-lt);color:var(--amber)}.b-s2{background:var(--purple-lt);color:var(--purple)}.b-s3{background:var(--blue-lt);color:#1a5a9a}.b-s4{background:#e0f0ff;color:#1a6a9a}.b-s5{background:#d8eeff;color:#175d8a}.b-s6{background:#cce8ff;color:#154d7a}.b-s7{background:#e8d6ff;color:#3d2880}.b-s8{background:var(--teal-lt);color:var(--teal)}
.prog-wrap{min-width:90px}
.prog-pct{font-size:10px;color:var(--text-3);margin-bottom:3px}
.prog-bar{height:6px;background:#e4e9f0;border-radius:3px;overflow:hidden}
.prog-inner{height:100%;border-radius:3px;transition:width .4s}
.p-done{background:var(--teal)}.p-active{background:var(--blue)}.p-warn{background:var(--amber)}.p-late{background:var(--red)}.p-none{background:#ccc}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;animation:fadeIn .2s}
.overlay.open{display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--white);border-radius:12px;width:100%;max-width:480px;overflow:hidden;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);color:white;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:15px;font-weight:600}
.modal-close{background:none;border:none;color:white;font-size:20px;cursor:pointer;opacity:.7;line-height:1;padding:2px 6px}
.modal-close:hover{opacity:1}
.modal-body{padding:20px}
.footer{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);color:rgba(255,255,255,.55);font-size:12px;padding:18px 28px;margin-top:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.footer-dev{color:rgba(255,255,255,.8);font-weight:500}
/* readonly badge */
.view-only-tag{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:3px 12px;font-size:11px;color:rgba(255,255,255,.8)}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>📊 ติดตามผลการประเมิน อปท.</h1>
    <p>ระบบติดตามผลการประเมินองค์กรปกครองส่วนท้องถิ่น · อัปเดตจาก Google Sheets</p>
  </div>
  <div class="hdr-right">
    <span class="view-only-tag">👁 โหมดดูข้อมูล</span>
    <div class="chip" id="today-chip"></div>
    <button class="btn btn-ghost" onclick="loadData()">↺ รีเฟรช</button>
  </div>
</div>

<div class="main" id="main">
  <div class="state-box"><div class="spinner"></div><div>กำลังโหลดข้อมูล…</div></div>
</div>

<div class="footer" id="footer">
  <span>© 2569 — ระบบติดตามผลการประเมิน อปท.</span>
  <span class="footer-dev">⚙ พัฒนาโดย Tanawat Yodburee</span>
</div>

<!-- Jobs detail modal (view only) -->
<div class="overlay" id="jobs-overlay" onclick="document.getElementById('jobs-overlay').classList.remove('open')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 id="jobs-modal-title">รายการงานประเมิน</h2>
      <button class="modal-close" onclick="document.getElementById('jobs-overlay').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body" id="jobs-modal-body"></div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxnkFZaT4S6KKIFhbY56H5FCcpAYsniop2yj2HhlTt1vA5mLdEgNj7uV5k-B0sHNLNP/exec';

const STATUS_LIST = [
  {label:'ยังไม่ยื่น',             short:'ยังไม่ยื่น',    cls:'b-s0',pct:0  },
  {label:'ตอบรับและเสนอราคา',      short:'เสนอราคา',      cls:'b-s1',pct:12 },
  {label:'อปท.จัดทำใบสั่งจ้าง',   short:'ใบสั่งจ้าง',    cls:'b-s2',pct:25 },
  {label:'สั่งจ้างและขออนุมัติ',   short:'ขออนุมัติ',     cls:'b-s3',pct:37 },
  {label:'เข้าระบบและจัดทำรายงาน', short:'จัดทำรายงาน',  cls:'b-s4',pct:50 },
  {label:'อปท.ตรวจสอบความถูกต้อง', short:'ตรวจสอบ',      cls:'b-s5',pct:62 },
  {label:'จัดทำเล่มรายงาน',        short:'จัดทำเล่ม',     cls:'b-s6',pct:75 },
  {label:'เสนอลงนามและจัดส่ง',     short:'จัดส่งรายงาน', cls:'b-s7',pct:87 },
  {label:'เงินเข้ามหาวิทยาลัย',    short:'เสร็จสิ้น ✓',   cls:'b-s8',pct:100},
];
const STATUS_COLORS=['#8a96a3','#b86a00','#5b3fa6','#2e6fad','#1d7aad','#1d6aad','#1a5a9a','#24426b','#1d8a74'];
const TODAY=new Date(); TODAY.setHours(0,0,0,0);
const fmtDate=d=>(!d||isNaN(d))?'—':d.toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'});
const parseDate=s=>{if(!s||!s.trim())return null;const d=new Date(s.trim());return isNaN(d)?null:d;};
const daysDiff=(a,b)=>Math.round((b-a)/86400000);

let _rows=[],_sortCol=null,_sortDir=1;

function getMockData(){return[
  {id:'1',name:'ทต.ท่าทอง',type:'ทต.',province:'พิษณุโลก',status:'8',startDate:'2025-01-15',deadline:'2025-06-30',jobs:'ด้านสาธารณสุข,ด้านการศึกษา,ด้านโครงสร้างพื้นฐาน',note:'เรียบร้อย'},
  {id:'2',name:'อบต.วังทอง',type:'อบต.',province:'พิษณุโลก',status:'7',startDate:'2025-02-01',deadline:'2025-07-31',jobs:'ด้านสาธารณสุข,ด้านสวัสดิการสังคม',note:''},
  {id:'3',name:'ทต.บึงพระ',type:'ทต.',province:'พิษณุโลก',status:'6',startDate:'2025-01-20',deadline:'2025-06-20',jobs:'ด้านการศึกษา',note:''},
  {id:'4',name:'อบต.นครไทย',type:'อบต.',province:'พิษณุโลก',status:'5',startDate:'2025-03-01',deadline:'2025-08-31',jobs:'ด้านสาธารณสุข,ด้านการเกษตร,ด้านสิ่งแวดล้อม',note:'รอเอกสาร'},
  {id:'5',name:'ทต.พรหมพิราม',type:'ทต.',province:'พิษณุโลก',status:'4',startDate:'2025-03-10',deadline:'2025-07-10',jobs:'ด้านโครงสร้างพื้นฐาน',note:''},
  {id:'6',name:'อบต.เนินมะปราง',type:'อบต.',province:'พิษณุโลก',status:'3',startDate:'2025-04-01',deadline:'2025-08-01',jobs:'ด้านสาธารณสุข',note:''},
  {id:'7',name:'ทต.สามง่าม',type:'ทต.',province:'พิษณุโลก',status:'2',startDate:'2025-04-15',deadline:'2025-09-15',jobs:'ด้านการศึกษา,ด้านสวัสดิการสังคม',note:''},
  {id:'8',name:'อบต.ชาติตระการ',type:'อบต.',province:'พิษณุโลก',status:'1',startDate:'2025-05-01',deadline:'2025-09-30',jobs:'ด้านสาธารณสุข',note:''},
  {id:'9',name:'ทน.พิษณุโลก',type:'ทน.',province:'พิษณุโลก',status:'0',startDate:'',deadline:'2025-10-31',jobs:'',note:''},
  {id:'10',name:'อบต.วัดโบสถ์',type:'อบต.',province:'พิษณุโลก',status:'4',startDate:'2025-02-20',deadline:'2025-05-31',jobs:'ด้านสาธารณสุข,ด้านการศึกษา',note:'เกินกำหนด'},
];}

async function loadData(){
  document.getElementById('main').innerHTML=`<div class="state-box"><div class="spinner"></div><div>กำลังโหลดข้อมูล…</div></div>`;
  try{
    let raw;
    if(API==='https://script.google.com/macros/s/AKfycbxnkFZaT4S6KKIFhbY56H5FCcpAYsniop2yj2HhlTt1vA5mLdEgNj7uV5k-B0sHNLNP/exec'){await new Promise(r=>setTimeout(r,500));raw=getMockData();}
    else{const res=await fetch(API+'?action=getAll');if(!res.ok)throw new Error('HTTP '+res.status);raw=await res.json();}
    _rows=raw.map(r=>({...r,statusNum:parseInt(r.status)||0,startDateObj:parseDate(r.startDate),deadlineObj:parseDate(r.deadline),jobsArr:r.jobs?r.jobs.split(',').map(j=>j.trim()).filter(Boolean):[]}));
    renderAll();
  }catch(e){
    document.getElementById('main').innerHTML=`<div class="state-box"><div style="font-size:32px;margin-bottom:12px">⚠️</div><div style="font-weight:600;margin-bottom:6px">ไม่สามารถโหลดข้อมูลได้</div><div style="font-size:12px;color:#8a96a3">${e.message}</div><button class="btn btn-primary" onclick="loadData()" style="margin:16px auto 0">ลองใหม่</button></div>`;
  }
}

function renderAll(){
  const m=document.getElementById('main');
  m.innerHTML='';
  m.appendChild(buildMetrics());
  m.appendChild(buildCharts());
  const sec=document.createElement('div');
  sec.innerHTML=`
    <div class="section-header"><h2>รายการ อปท. ทั้งหมด</h2></div>
    <div class="toolbar">
      <select id="f-sf" onchange="applyFilter()">
        <option value="all">ทุกสถานะ</option>
        ${STATUS_LIST.map((s,i)=>`<option value="${i}">${i}. ${s.label}</option>`).join('')}
        <option value="late">เกินกำหนด</option>
      </select>
      <select id="f-tf" onchange="applyFilter()">
        <option value="all">ทุกประเภท</option>
        <option>อบต.</option><option>ทต.</option><option>ทน.</option><option>อบจ.</option>
      </select>
      <input type="text" id="f-q" placeholder="ค้นหาชื่อ อปท. / งาน…" oninput="applyFilter()">
      <span class="result-count" id="result-count"></span>
    </div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th class="sortable" onclick="sortBy('name')" id="th-name">ชื่อ อปท.<span class="sort-icon">⇅</span></th>
        <th>ประเภท / จังหวัด</th>
        <th class="sortable" onclick="sortBy('jobCount')" id="th-jobCount">งานประเมิน<span class="sort-icon">⇅</span></th>
        <th class="sortable" onclick="sortBy('statusNum')" id="th-statusNum">สถานะ<span class="sort-icon">⇅</span></th>
        <th style="min-width:100px">ความคืบหน้า</th>
        <th class="sortable" onclick="sortBy('startDateObj')" id="th-startDateObj">วันเริ่ม<span class="sort-icon">⇅</span></th>
        <th class="sortable" onclick="sortBy('deadlineObj')" id="th-deadlineObj">กำหนดเสร็จ<span class="sort-icon">⇅</span></th>
        <th class="sortable" onclick="sortBy('daysLeft')" id="th-daysLeft">วันคงเหลือ<span class="sort-icon">⇅</span></th>
        <th>หมายเหตุ</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table></div>`;
  m.appendChild(sec);
  applyFilter();
  let ft=document.getElementById('footer');
  let upd=ft.querySelector('.upd');
  if(!upd){upd=document.createElement('span');upd.className='upd';ft.appendChild(upd);}
  upd.style.cssText='font-size:11px;opacity:.6';
  upd.textContent='อัปเดต: '+new Date().toLocaleString('th-TH');
}

function buildMetrics(){
  const total=_rows.length,done=_rows.filter(r=>r.statusNum===8).length,
    active=_rows.filter(r=>r.statusNum>0&&r.statusNum<8).length,
    none=_rows.filter(r=>r.statusNum===0).length,
    late=_rows.filter(r=>r.statusNum<8&&r.deadlineObj&&r.deadlineObj<TODAY).length,
    totalJobs=_rows.reduce((s,r)=>s+(r.jobsArr?r.jobsArr.length:0),0),
    pct=total?Math.round(done/total*100):0;
  const d=document.createElement('div');d.className='metrics';
  d.innerHTML=`
    <div class="metric m-total"><div class="m-label">อปท. ทั้งหมด</div><div class="m-value">${total}</div><div class="m-sub">รายการในระบบ</div></div>
    <div class="metric m-done"><div class="m-label">เสร็จสิ้น</div><div class="m-value">${done}</div><div class="m-sub">${pct}% ของทั้งหมด</div></div>
    <div class="metric m-active"><div class="m-label">กำลังดำเนินการ</div><div class="m-value">${active}</div><div class="m-sub">ขั้นตอน 1–7</div></div>
    <div class="metric m-none"><div class="m-label">ยังไม่ยื่น</div><div class="m-value">${none}</div><div class="m-sub">รอดำเนินการ</div></div>
    <div class="metric m-late"><div class="m-label">เกินกำหนด</div><div class="m-value">${late}</div><div class="m-sub">ต้องเร่งดำเนิน</div></div>
    <div class="metric m-jobs"><div class="m-label">งานรวมทั้งหมด</div><div class="m-value">${totalJobs}</div><div class="m-sub">จาก ${total} อปท.</div></div>`;
  return d;
}

function buildCharts(){
  const total=_rows.length||1,done=_rows.filter(r=>r.statusNum===8).length,
    active=_rows.filter(r=>r.statusNum>0&&r.statusNum<8).length,none=_rows.filter(r=>r.statusNum===0).length,
    pct=Math.round(done/total*100),C=2*Math.PI*50,seg=p=>p/100*C;
  const d=document.createElement('div');d.className='charts-row';
  d.innerHTML=`
  <div class="chart-card">
    <div class="chart-title">ภาพรวมการดำเนินงาน</div>
    <div class="donut-wrap">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="50" fill="none" stroke="#eef1f6" stroke-width="16"/>
        <circle cx="60" cy="60" r="50" fill="none" stroke="#1d8a74" stroke-width="16" stroke-dasharray="${C}" stroke-dashoffset="${C-seg(done/total*100)}" stroke-linecap="round"/>
        <circle cx="60" cy="60" r="50" fill="none" stroke="#2e6fad" stroke-width="16" opacity=".35" stroke-dasharray="${C}" stroke-dashoffset="${C-seg((done+active)/total*100)}" stroke-linecap="round"/>
      </svg>
      <div class="donut-center">${pct}%<span>เสร็จสิ้น</span></div>
    </div>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#1d8a74"></div>เสร็จสิ้น (${done})</div>
      <div class="leg-item"><div class="leg-dot" style="background:#2e6fad"></div>กำลังดำเนิน (${active})</div>
      <div class="leg-item"><div class="leg-dot" style="background:#dde3ec"></div>ยังไม่ยื่น (${none})</div>
    </div>
  </div>
  <div class="chart-card"><div class="chart-title">จำนวน อปท. แต่ละขั้นตอน</div><div class="bar-chart" id="step-bars"></div></div>
  <div class="chart-card"><div class="chart-title">อปท. ที่ใกล้/เกินกำหนด</div><div id="overdue-area"></div></div>`;
  setTimeout(()=>{
    const counts=STATUS_LIST.map((_,i)=>_rows.filter(r=>r.statusNum===i).length),maxC=Math.max(...counts,1);
    document.getElementById('step-bars').innerHTML=counts.map((c,i)=>`<div class="bar-row"><div class="bar-label">${i}</div><div class="bar-outer"><div class="bar-inner" style="width:${c/maxC*100}%;background:${STATUS_COLORS[i]}"></div></div><div class="bar-count">${c}</div></div>`).join('');
    const cutoff=new Date(TODAY.getTime()+14*86400000);
    const warn=_rows.filter(r=>r.statusNum<8&&r.deadlineObj&&r.deadlineObj<=cutoff).sort((a,b)=>(a.deadlineObj||0)-(b.deadlineObj||0)).slice(0,6);
    const oa=document.getElementById('overdue-area');
    if(!warn.length){oa.innerHTML=`<div class="no-overdue">✅ ไม่มี อปท. ที่ใกล้หรือเกินกำหนด</div>`;}
    else{oa.innerHTML=`<div class="overdue-list">${warn.map(r=>{const left=daysDiff(TODAY,r.deadlineObj),late=left<0,bg=late?'var(--red-lt)':'var(--amber-lt)',bc=late?'#f5b3b3':'#f5d28a',col=late?'var(--red)':'var(--amber)',txt=late?`เกิน ${Math.abs(left)} วัน`:`${left} วัน`;return`<div class="overdue-item" style="background:${bg};border-color:${bc}"><div style="font-size:12px;font-weight:500;color:${col}">${r.name}</div><div style="font-size:11px;color:${col}">${txt}</div></div>`;}).join('')}</div>`;}
  },0);
  return d;
}

function applyFilter(){
  const sf=document.getElementById('f-sf')?.value||'all',tf=document.getElementById('f-tf')?.value||'all',q=(document.getElementById('f-q')?.value||'').toLowerCase();
  let rows=_rows.map(r=>({...r,jobCount:r.jobsArr.length,daysLeft:r.deadlineObj?daysDiff(TODAY,r.deadlineObj):null})).filter(r=>{
    if(sf==='late'){if(r.statusNum===8||!r.deadlineObj||r.deadlineObj>=TODAY)return false;}
    else if(sf!=='all'&&parseInt(sf)!==r.statusNum)return false;
    if(tf!=='all'&&r.type!==tf)return false;
    if(q&&!r.name.toLowerCase().includes(q)&&!(r.province||'').toLowerCase().includes(q)&&!r.jobsArr.some(j=>j.toLowerCase().includes(q)))return false;
    return true;
  });
  if(_sortCol){rows=[...rows].sort((a,b)=>{let va=a[_sortCol],vb=b[_sortCol];if(va instanceof Date)va=va.getTime();if(vb instanceof Date)vb=vb.getTime();if(va==null)va=_sortDir>0?Infinity:-Infinity;if(vb==null)vb=_sortDir>0?Infinity:-Infinity;if(typeof va==='string')return va.localeCompare(vb,'th')*_sortDir;return(va-vb)*_sortDir;});}
  const rc=document.getElementById('result-count');if(rc)rc.textContent=`แสดง ${rows.length} รายการ`;
  const tbody=document.getElementById('tbody');if(!tbody)return;
  tbody.innerHTML=rows.map(r=>{
    const st=STATUS_LIST[r.statusNum]||STATUS_LIST[0],left=r.daysLeft,isLate=r.statusNum<8&&r.deadlineObj&&r.deadlineObj<TODAY;
    let daysCls='days-ok',daysText='—';
    if(r.statusNum===8){daysCls='days-done';daysText='เสร็จแล้ว';}
    else if(left!==null){daysText=left<0?`เกิน ${Math.abs(left)} วัน`:`${left} วัน`;daysCls=left<0?'days-late':left<=14?'days-warn':'days-ok';}
    let pCls='p-active';if(r.statusNum===8)pCls='p-done';else if(isLate)pCls='p-late';else if(left!==null&&left<=14)pCls='p-warn';else if(r.statusNum===0)pCls='p-none';
    let jobsHtml='';
    if(!r.jobsArr||!r.jobsArr.length)jobsHtml=`<div class="jobs-empty">— ไม่ระบุ</div>`;
    else if(r.jobsArr.length<=2)jobsHtml=`<div class="jobs-count">${r.jobsArr.length} งาน</div><div class="jobs-tags">${r.jobsArr.map(j=>`<span class="job-tag">${j}</span>`).join('')}</div>`;
    else jobsHtml=`<div class="jobs-count">${r.jobsArr.length} งาน</div><div class="jobs-tags">${r.jobsArr.slice(0,2).map(j=>`<span class="job-tag">${j}</span>`).join('')}<button class="jobs-detail-btn" onclick="showJobs('${r.id}')">+${r.jobsArr.length-2} เพิ่มเติม</button></div>`;
    return`<tr><td class="td-name">${r.name}</td><td><div class="td-meta">${r.type||'—'}</div><div class="td-meta">${r.province||'—'}</div></td><td><div class="jobs-cell">${jobsHtml}</div></td><td><span class="badge ${st.cls}">${r.statusNum}. ${st.short}</span></td><td><div class="prog-wrap"><div class="prog-pct">${st.pct}%</div><div class="prog-bar"><div class="prog-inner ${pCls}" style="width:${st.pct}%"></div></div></div></td><td class="td-date">${fmtDate(r.startDateObj)}</td><td class="td-date">${fmtDate(r.deadlineObj)}</td><td class="td-days ${daysCls}">${daysText}</td><td style="font-size:11px;color:var(--text-3);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.note||'—'}</td></tr>`;
  }).join('');
}

function sortBy(col){
  if(_sortCol===col)_sortDir*=-1;else{_sortCol=col;_sortDir=1;}
  ['name','jobCount','statusNum','startDateObj','deadlineObj','daysLeft'].forEach(c=>{const th=document.getElementById('th-'+c);if(!th)return;th.classList.remove('sort-asc','sort-desc');th.querySelector('.sort-icon').textContent='⇅';});
  const th=document.getElementById('th-'+col);if(th){th.classList.add(_sortDir===1?'sort-asc':'sort-desc');th.querySelector('.sort-icon').textContent=_sortDir===1?'↑':'↓';}
  applyFilter();
}

function showJobs(id){
  const r=_rows.find(x=>x.id===id);if(!r)return;
  document.getElementById('jobs-modal-title').textContent=`งานประเมิน — ${r.name}`;
  document.getElementById('jobs-modal-body').innerHTML=`<p style="font-size:12px;color:var(--text-2);margin-bottom:12px">จำนวน <strong>${r.jobsArr.length} งาน</strong> ที่ขอรับการประเมิน</p><div style="display:flex;flex-direction:column;gap:8px">${r.jobsArr.map((j,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--purple-lt);border-radius:var(--radius);border:1px solid #d5c8f5"><span style="width:22px;height:22px;background:var(--purple);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0">${i+1}</span><span style="font-size:13px">${j}</span></div>`).join('')}</div>`;
  document.getElementById('jobs-overlay').classList.add('open');
}

document.getElementById('today-chip').textContent='วันนี้: '+TODAY.toLocaleDateString('th-TH',{weekday:'short',day:'numeric',month:'long',year:'numeric'});
loadData();
</script>
</body>
</html>
